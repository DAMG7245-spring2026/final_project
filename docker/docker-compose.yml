# docker-compose.yml for PE Org-AI-R Platform

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Snowflake Configuration
      - SNOWFLAKE_ACCOUNT=${SNOWFLAKE_ACCOUNT}
      - SNOWFLAKE_USER=${SNOWFLAKE_USER}
      - SNOWFLAKE_PASSWORD=${SNOWFLAKE_PASSWORD}
      - SNOWFLAKE_DATABASE=${SNOWFLAKE_DATABASE:-CTI_PLATFORM_DATABASE}
      - SNOWFLAKE_SCHEMA=${SNOWFLAKE_SCHEMA:-PUBLIC}
      - SNOWFLAKE_WAREHOUSE=${SNOWFLAKE_WAREHOUSE:-COMPUTE_WH}
      # Redis Configuration (use service name in Docker network)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      # AWS S3 Configuration
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET}
      # Neo4j Configuration
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      # LLM Provider Keys (LiteLLM picks the right one based on llm_model_*).
      # Bare-name form: forwards the host env var ONLY if it's actually set —
      # avoids handing an empty string to pydantic-settings for typed fields.
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
      # LLM Router overrides (all optional; unset → defaults in app/config.py)
      - LLM_MODEL_CYPHER_GENERATION
      - LLM_MODEL_ANSWER_GENERATION
      - LLM_MODEL_DOCTYPE_CLASSIFICATION
      - LLM_MODEL_RAG_ROUTING
      - LLM_MODEL_DEFAULT
      - LLM_DAILY_BUDGET_USD
      - LLM_BUDGET_ENFORCE
      # NVD (used by ingestion scripts; harmless in the api container)
      - NVD_API_KEY
      # Application Configuration
      - DEBUG=${DEBUG:-false}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pe-org-air-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Streamlit CTI console → same-network API at http://api:8000
  cti-ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      - CTI_API_BASE=http://api:8000
    depends_on:
      api:
        condition: service_started
    networks:
      - pe-org-air-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - pe-org-air-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: redis-server --appendonly yes

volumes:
  redis_data:
    driver: local

networks:
  pe-org-air-network:
    driver: bridge