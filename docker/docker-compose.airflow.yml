# Airflow 2.8 (LocalExecutor) + Postgres for DAG UI and scheduler.
# From repo root:
#   docker compose --env-file .env -f docker/docker-compose.airflow.yml up --build -d
# AIRFLOW_FERNET_KEY in .env is optional: compose supplies a dev-only default below.
# Override AIRFLOW_FERNET_KEY for non-local use; never rely on the default in production.

x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: docker/airflow/Dockerfile
  env_file:
    - ../.env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/project/airflow/dags
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    # Dev-only default (committed): fine for solo local UI tests; set AIRFLOW_FERNET_KEY in .env to override.
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-yVc6DyNK7X6D-m3lWdlEsfPvwJhsuXEvM2cqCystujc=}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-dev-only-change-me-in-production}
    PYTHONPATH: /opt/project
    CTI_PROJECT_ROOT: /opt/project
  volumes:
    - ..:/opt/project
    - airflow_logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        airflow db migrate
        airflow users create \
          --username airflow \
          --firstname Air \
          --lastname Flow \
          --role Admin \
          --email airflow@example.com \
          --password airflow \
          || true
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  airflow_logs:
  airflow_postgres_data:
